name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000

    env:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_BUCKET_NAME: fragments
      AWS_DYNAMODB_TABLE_NAME: fragments
      AWS_DYNAMODB_ENDPOINT: http://localhost:8000
      AWS_DYNAMODB_ENDPOINT_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Wait for DynamoDB
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000 > /dev/null; then
              echo "DynamoDB ready"
              break
            fi
            sleep 2
          done

      - name: Create DynamoDB table
        run: |
          node -e "
          const { DynamoDBClient, CreateTableCommand } = require('@aws-sdk/client-dynamodb');
          const client = new DynamoDBClient({
            region: 'us-east-1',
            endpoint: 'http://localhost:8000',
            credentials: { accessKeyId: 'test', secretAccessKey: 'test' }
          });
          (async () => {
            try {
              await client.send(new CreateTableCommand({
                TableName: 'fragments',
                AttributeDefinitions: [
                  { AttributeName: 'ownerId', AttributeType: 'S' },
                  { AttributeName: 'id', AttributeType: 'S' }
                ],
                KeySchema: [
                  { AttributeName: 'ownerId', KeyType: 'HASH' },
                  { AttributeName: 'id', KeyType: 'RANGE' }
                ],
                BillingMode: 'PAY_PER_REQUEST'
              }));
              console.log('Table created');
            } catch (e) {
              console.log('Table exists');
            }
          })();
          "

      - run: npm test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, dockerfile-lint, unit-tests]

    env:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_BUCKET_NAME: fragments
      AWS_DYNAMODB_TABLE_NAME: fragments
      AWS_DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      AWS_S3_ENDPOINT: http://localstack:4566
      AWS_S3_ENDPOINT_URL: http://localstack:4566
      HTPASSWD_FILE: /app/.htpasswd

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Hurl
        run: |
          curl -LO https://github.com/Orange-OpenSource/hurl/releases/download/4.1.0/hurl_4.1.0_amd64.deb
          sudo dpkg -i hurl_4.1.0_amd64.deb

      - name: Start containers
        run: docker compose up -d --build

      - name: Wait for LocalStack
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"s3"'; then
              echo "LocalStack ready"
              break
            fi
            sleep 3
          done

      - name: Wait for DynamoDB
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000 > /dev/null; then
              echo "DynamoDB ready"
              break
            fi
            sleep 2
          done

      - name: Setup AWS resources
        run: |
          set +e

          aws s3 mb s3://fragments \
            --endpoint-url http://localhost:4566 \
            --region us-east-1 || true

          aws dynamodb create-table \
            --table-name fragments \
            --attribute-definitions AttributeName=ownerId,AttributeType=S AttributeName=id,AttributeType=S \
            --key-schema AttributeName=ownerId,KeyType=HASH AttributeName=id,KeyType=RANGE \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url http://localhost:8000 \
            --region us-east-1 || true

          set -e

      - name: Wait for fragments service
        run: |
          echo "Waiting for fragments service..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/ | grep -q "ok"; then
              echo "Fragments ready"
              exit 0
            fi
            sleep 2
          done

          echo "Fragments failed to start!"
          docker compose logs fragments
          exit 1

      - name: Run Hurl tests
        run: npx hurl --test tests/integration/lab-10-dynamodb.hurl

      - name: Stop containers
        if: always()
        run: docker compose down

  docker-hub:
    name: Build and Push to Docker Hub
    needs: [lint, dockerfile-lint, unit-tests, integration-tests]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ddhameliya05/fragments:sha-${{ github.sha }}
            ddhameliya05/fragments:main
            ddhameliya05/fragments:latest
