name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install node dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          SERVICES: s3

      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000

    env:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_BUCKET_NAME: fragments
      AWS_S3_ENDPOINT_URL: http://localhost:4566
      AWS_DYNAMODB_TABLE_NAME: fragments
      AWS_DYNAMODB_ENDPOINT_URL: http://localhost:8000

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli

      - name: Install node dependencies
        run: npm ci

      - name: Wait for LocalStack
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:4566/_localstack/health > /dev/null; then
              echo "LocalStack is ready"
              break
            fi
            echo "Waiting for LocalStack..."
            sleep 2
          done

      - name: Wait for DynamoDB Local
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000 > /dev/null; then
              echo "DynamoDB Local is ready"
              break
            fi
            echo "Waiting for DynamoDB Local..."
            sleep 2
          done

      - name: Create S3 bucket
        run: |
          aws --endpoint-url=http://localhost:4566 s3api create-bucket --bucket fragments || true

      - name: Create DynamoDB table
        run: |
          aws --endpoint-url=http://localhost:8000 dynamodb create-table \
            --table-name fragments \
            --attribute-definitions AttributeName=ownerId,AttributeType=S AttributeName=id,AttributeType=S \
            --key-schema AttributeName=ownerId,KeyType=HASH AttributeName=id,KeyType=RANGE \
            --billing-mode PAY_PER_REQUEST || true

      - name: Run tests
        run: npm test

  docker-hub:
    name: Build and Push to Docker Hub
    needs: [lint, dockerfile-lint, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        env:
          DOCKERHUB_REPO: ddhameliya05/fragments
          SHA_TAG: sha-${{ github.sha }}
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.DOCKERHUB_REPO }}:${{ env.SHA_TAG }},${{ env.DOCKERHUB_REPO }}:main,${{ env.DOCKERHUB_REPO }}:latest
