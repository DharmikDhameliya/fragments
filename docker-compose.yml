services:
  fragments:
    build: .
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      NODE_ENV: development
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_BUCKET_NAME: fragments
      AWS_DYNAMODB_TABLE_NAME: fragments
      AWS_S3_ENDPOINT: http://localstack:4566
      AWS_S3_ENDPOINT_URL: http://localstack:4566
      AWS_DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      HTPASSWD_FILE: /app/.htpasswd
    volumes:
      - ./tests/.htpasswd:/app/.htpasswd:ro
    depends_on:
      - localstack
      - dynamodb-local

  localstack:
    image: localstack/localstack:0.14.2
    ports:
      - '4566:4566'
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      DEBUG: 0

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: ['-jar', 'DynamoDBLocal.jar', '-sharedDb', '-inMemory']
    ports:
      - '8000:8000'
